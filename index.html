<!DOCTYPE html>

const sharedOptions = ["Marque blanche","Domaine personnalisé","Personnalisation design","Import de votre base de données","Application mobile en nom propre"];

  { q:"Faut-il changer ses habitudes pour utiliser Cocohop ?", a:"Non. Cocohop s'intègre facilement dans les pratiques existantes.\nLa plateforme a été conçue avec des professionnels du tourisme pour s'adapter aux workflows réels, sans imposer de processus rigide." },
  { q:"Cocohop est-il adapté à une activité qui souhaite scaler ?", a:"Oui. Cocohop repose sur un socle structuré, capable d'accompagner la croissance sans standardiser les voyages.\nLa plateforme permet de produire plus, mieux et plus vite, tout en conservant une approche sur mesure." },
];

const Arrow = () => React.createElement('svg',{width:14,height:14,viewBox:"0 0 24 24",fill:"none",style:{flexShrink:0}},
  React.createElement('path',{d:"M5 12h14M13 6l6 6-6 6",stroke:"currentColor",strokeWidth:2,strokeLinecap:"round",strokeLinejoin:"round"}));

const Check = ({dark}) => React.createElement('svg',{width:18,height:18,viewBox:"0 0 18 18",fill:"none",style:{flexShrink:0,marginTop:"2px"}},
  React.createElement('circle',{cx:9,cy:9,r:9,fill:dark?"rgba(255,255,255,.15)":"rgba(9,127,120,.15)"}),
  React.createElement('path',{d:"M5.5 9l2.5 2.5 4.5-4.5",stroke:dark?"rgba(255,255,255,.8)":TEAL,strokeWidth:1.8,strokeLinecap:"round",strokeLinejoin:"round"}));

function App() {
  const [billing, setBilling] = React.useState("annual");
  const [openFaq, setOpenFaq] = React.useState(null);
  const firstName = prospectProfile.name.split(' ')[0];
  const h = (tag, props, ...children) => React.createElement(tag, props, ...children);

  return h('div',{style:{minHeight:"100vh",background:"#fff",color:TEXT,fontFamily:"'Montserrat Alternates',sans-serif"}},

    /* NAV */

    /* HERO */
    h('section',{style:{maxWidth:"800px",margin:"0 auto",padding:"72px 32px 56px",textAlign:"center"}},
      h('div',{className:"fu",style:{display:"inline-flex",alignItems:"center",gap:"8px",background:"rgba(221,89,32,.08)",border:"1px solid rgba(221,89,32,.2)",borderRadius:"100px",padding:"5px 16px",marginBottom:"24px"}},

      h('h1',{className:"fu",style:{fontSize:"46px",fontWeight:700,lineHeight:1.1,marginBottom:"20px",color:ORANGE}},

        h('span',{style:{background:`linear-gradient(135deg,${ORANGE},${TEAL})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontStyle:"italic"}},

      h('p',{className:"fu",style:{fontSize:"16px",color:MUTED,lineHeight:1.75,marginBottom:"40px"}},

      h('div',{className:"fu",style:{display:"flex",justifyContent:"center",gap:"40px",flexWrap:"wrap",padding:"28px 40px",background:CARD,border:`1px solid ${BORDER}`,borderRadius:"20px"}},

            h('div',{style:{fontSize:"28px",fontWeight:700,color:c}},v),
            h('div',{style:{fontSize:"12px",color:MUTED,marginTop:"4px"}},l)
          )
        )
      )
    ),

    /* BANNER */
    h('section',{style:{maxWidth:"1100px",margin:"0 auto 72px",padding:"0 32px"}},

      )

    /* PROFIL PROSPECT */

        h('h2',{style:{fontSize:"34px",fontWeight:700,color:ORANGE}}, prospectProfile.name)

      h('div',{style:{background:`linear-gradient(135deg,rgba(221,89,32,.06),rgba(9,127,120,.04))`,border:`1px solid rgba(221,89,32,.15)`,borderRadius:"20px",padding:"28px 32px",marginBottom:"36px",display:"flex",alignItems:"center",gap:"20px",flexWrap:"wrap"}},

      h('div',null,

    /* FAQ */

        h('h2',{style:{fontSize:"34px",fontWeight:700,marginTop:"8px",color:ORANGE}}, "Vos questions")
      ),
      h('div',{style:{display:"flex",flexDirection:"column",gap:"10px"}},
        faq.map((item,i) =>
          h('div',{key:i,style:{background:"#fff",border:`1px solid ${openFaq===i?"rgba(221,89,32,.3)":BORDER}`,borderRadius:"14px",overflow:"hidden",transition:"all .2s"}},
            h('button',{onClick:()=>setOpenFaq(openFaq===i?null:i),style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px",background:"none",border:"none",textAlign:"left",gap:"12px"}},

                openFaq===i?"×":"+"
              )

            openFaq===i && h('div',{style:{padding:"0 24px 20px",paddingTop:"16px",fontSize:"13px",color:MUTED,lineHeight:1.8,whiteSpace:"pre-line",borderTop:`1px solid ${BORDER}`}},item.a)
          )

      )

      h('div',{style:{textAlign:"center",marginBottom:"36px"}},

        h('h2',{style:{fontSize:"34px",fontWeight:700,margin:"8px 0 8px",color:ORANGE}}, "Choisissez votre plan"),
        h('p',{style:{fontSize:"13px",color:MUTED,marginBottom:"24px"}}, "14 jours d'essai gratuit — sans carte bancaire"),
        h('div',{style:{display:"inline-flex",background:CARD,border:`1px solid ${BORDER}`,borderRadius:"100px",padding:"4px"}},
          [["monthly","Mensuel",null],["annual","Annuel","-20%"]].map(([b,l,badge]) =>
            h('button',{key:b,onClick:()=>setBilling(b),style:{padding:"9px 22px",borderRadius:"100px",fontSize:"13px",fontWeight:500,background:billing===b?TEXT:"transparent",color:billing===b?"#fff":MUTED,display:"inline-flex",alignItems:"center",gap:"6px",border:"none",transition:"all .15s"}},

        plans.map(plan =>

            plan.badge && h('div',{style:{position:"absolute",top:"-1px",left:"50%",transform:"translateX(-50%)",background:ORANGE,color:"#fff",padding:"4px 14px",borderRadius:"100px",fontSize:"10px",fontWeight:700,whiteSpace:"nowrap",zIndex:1}},`✦ ${plan.badge}`),

            h('a',{href:"https://meetings.hubspot.com/alexandre341?uuid=9fb68135-4b2d-4e6b-93d2-e8508e77be83",target:"_blank",rel:"noopener noreferrer",style:{display:"inline-flex",alignItems:"center",gap:"8px",padding:"11px 22px",borderRadius:"100px",background:ORANGE,color:"#fff",fontSize:"13px",fontWeight:700,boxShadow:`0 4px 20px rgba(221,89,32,.25)`}},
